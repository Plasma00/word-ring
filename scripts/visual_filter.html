<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>候选词人工筛选器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 680px;
  width: 100%;
  background: #16213e;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* 顶部进度条 */
.progress-bar-wrap {
  background: #0f3460;
  border-radius: 8px;
  height: 6px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #e94560, #f5a623);
  transition: width 0.2s;
  border-radius: 8px;
}
.progress-text {
  font-size: 13px;
  color: #8899aa;
  text-align: center;
  margin-bottom: 20px;
}

/* 词卡片 */
.word-card {
  background: #0f3460;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  text-align: center;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.word-card.hover-accept { border-color: #4caf84; }
.word-card.hover-reject { border-color: #e94560; }

.word-main {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 4px;
}
.word-main.cn { color: #f0e68c; }
.word-main.latin { color: #7ec8e3; }
.word-main.mixed { color: #d4a5ff; }

.word-meta {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 14px;
  color: #aabbcc;
  margin-bottom: 8px;
}
.word-meta span {
  background: #1a1a2e;
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
}
.tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin: 2px;
}
.tag-source-jieba { background: #3742fa; color: #fff; }
.tag-source-ngram { background: #2ed573; color: #000; }
.tag-source-latin { background: #1e90ff; color: #fff; }
.tag-pun { background: #ff6b6b; color: #fff; }
.tag-new { background: #ffa502; color: #000; }

.reason-line {
  margin-top: 10px;
  font-size: 15px;
  color: #f5a623;
  min-height: 22px;
}

/* 按钮 */
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 16px;
}
.btn {
  padding: 14px 32px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  min-width: 100px;
}
.btn:active { transform: scale(0.96); }
.btn-accept { background: #4caf84; color: #fff; }
.btn-accept:hover { box-shadow: 0 0 16px rgba(76,175,132,0.5); }
.btn-reject { background: #e94560; color: #fff; }
.btn-reject:hover { box-shadow: 0 0 16px rgba(233,69,96,0.5); }
.btn-skip { background: #3a3a5c; color: #ccc; }
.btn-skip:hover { box-shadow: 0 0 12px rgba(138,138,170,0.4); }
.btn-undo { background: #f5a623; color: #000; font-size: 14px; padding: 10px 20px; }
.btn-export { background: #7c5ce7; color: #fff; font-size: 14px; padding: 10px 20px; }

/* 文件加载 */
.file-section {
  text-align: center;
  padding: 60px 20px;
}
.file-section h2 {
  margin-bottom: 16px;
  font-size: 22px;
}
.file-input {
  display: none;
}
.file-label {
  display: inline-block;
  padding: 14px 36px;
  background: #e94560;
  color: #fff;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 600;
}
.file-label:hover { box-shadow: 0 0 16px rgba(233,69,96,0.5); }
.file-hint {
  margin-top: 12px;
  color: #8899aa;
  font-size: 13px;
}

/* 完成界面 */
.done-section {
  text-align: center;
  padding: 40px 20px;
}
.done-section h2 { color: #4caf84; margin-bottom: 12px; }
.done-stats {
  font-size: 16px;
  color: #ccc;
  margin-bottom: 20px;
  line-height: 2;
}

/* 键位提示 */
.key-hints {
  display: flex;
  gap: 20px;
  justify-content: center;
  font-size: 12px;
  color: #667788;
  margin-top: 8px;
}
.key-hints kbd {
  background: #0f3460;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid #445566;
  font-family: monospace;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- 文件加载界面 -->
  <div class="file-section" id="fileSection">
    <h2>📋 加载候选词文件</h2>
    <p style="color:#8899aa;margin-bottom:20px;">选择 extract_words_v3 生成的 candidate_words.json</p>
    <input type="file" id="fileInput" class="file-input" accept=".json" onchange="loadFile(event)">
    <label for="fileInput" class="file-label">📁 选择 candidate_words.json</label>
    <p class="file-hint">也支持拖拽文件到页面任意位置</p>
    <p class="file-hint" style="margin-top:16px;">
      输出兼容 filter_words.py 的 keep.txt / remove.txt
    </p>
  </div>

  <!-- 筛选界面 -->
  <div id="filterSection" style="display:none;">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>

    <div class="word-card" id="wordCard">
      <div class="word-main cn" id="wordMain">---</div>
      <div class="word-meta" id="wordMeta"></div>
      <div class="reason-line" id="reasonLine"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-reject" onclick="reject()" id="btnReject">✕ 拒绝</button>
      <button class="btn btn-skip" onclick="skip()">≫ 跳过</button>
      <button class="btn btn-accept" onclick="accept()" id="btnAccept">✓ 保留</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-undo" onclick="undo()" id="btnUndo" disabled>↩ 撤销</button>
      <button class="btn btn-export" onclick="exportFiles()">💾 导出全部</button>
    </div>
    <div class="key-hints">
      <span><kbd>A</kbd> 保留</span>
      <span><kbd>R</kbd> 拒绝</span>
      <span><kbd>S</kbd> 跳过</span>
      <span><kbd>Ctrl+Z</kbd> 撤销</span>
    </div>
  </div>

  <!-- 完成界面 -->
  <div class="done-section" id="doneSection" style="display:none;">
    <h2>✅ 筛选完成！</h2>
    <div class="done-stats" id="doneStats"></div>
    <button class="btn btn-export" onclick="exportFiles()" style="font-size:16px;padding:14px 36px;">
      💾 导出 keep.txt + remove.txt + skip.txt + skip_words.json
    </button>
    <p style="color:#8899aa;margin-top:16px;">下载所有文件到 output_v3/ 后直接运行 merge_categorize.py</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 全局状态 ──────────────────────────────────────────
let candidates = [];
let currentIndex = 0;
let keepSet = new Set();    // 保留的词
let removeSet = new Set();  // 拒绝的词
let skipOrder = [];         // 跳过的词 (按跳过顺序，可回看)
let skipSet = new Set();    // 跳过的词 (快速查找)
let history = [];           // 撤销栈: [{index, action}]
let reviewMode = false;     // 是否在回看跳过词模式
let reviewIndex = 0;        // 回看模式下的位置

// ── 文件加载 ──────────────────────────────────────────
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('JSON 不是数组格式');
      candidates = data;
      currentIndex = 0;
      keepSet = new Set();
      removeSet = new Set();
      history = [];

      // 尝试从 localStorage 恢复进度
      const saved = loadProgress(file.name);
      if (saved && saved.keepSet) {
        keepSet = new Set(saved.keepSet);
        removeSet = new Set(saved.removeSet || []);
        skipOrder = saved.skipOrder || [];
        skipSet = new Set(skipOrder);
        reviewMode = false;
        reviewIndex = 0;
        currentIndex = saved.currentIndex || 0;
        if (keepSet.size + removeSet.size + skipOrder.length > 0) {
          showToast(`已恢复: ${keepSet.size}保留 ${removeSet.size}拒绝 ${skipOrder.length}跳过`);
        }
      }

      initFilter();
    } catch (err) {
      alert('文件解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── 拖拽支持 ──────────────────────────────────────────
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.json')) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    loadFile({ target: { files: [file] } });
  }
});

// ── 键盘快捷键 ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('filterSection').style.display === 'none') return;
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case 'a': accept(); break;
    case 'r': reject(); break;
    case 's': skip(); break;
  }
});

// ── 初始化筛选界面 ────────────────────────────────────
function initFilter() {
  document.getElementById('fileSection').style.display = 'none';
  document.getElementById('filterSection').style.display = 'block';
  document.getElementById('doneSection').style.display = 'none';
  if (skipOrder.length > 0 && currentIndex >= candidates.length) {
    // 刚回看完跳过词，进入完成界面
    showDone();
  } else {
    showCurrentWord();
  }
}

// ── 显示当前词 ─────────────────────────────────────────
function showCurrentWord() {
  // 检查是否完成（包括跳过词回看）
  if (currentIndex >= candidates.length) {
    // 有跳过词且不在回看模式 → 提示回看
    if (skipOrder.length > 0 && !reviewMode) {
      showSkipPrompt();
      return;
    }
    showDone();
    return;
  }

  const c = candidates[currentIndex];
  const total = candidates.length;
  const decided = keepSet.size + removeSet.size;
  const skipped = skipOrder.length;

  // 进度条
  document.getElementById('progressBar').style.width = (currentIndex / total * 100) + '%';
  const modeTag = reviewMode ? ' [回看跳过词]' : '';
  document.getElementById('progressText').textContent =
    `${currentIndex+1} / ${total}${modeTag} · 保留 ${keepSet.size} · 拒绝 ${removeSet.size} · 跳过 ${skipped}`;

  // 词卡片
  const wordEl = document.getElementById('wordMain');
  wordEl.textContent = c.word;

  // 颜色类
  const hasCn = /[一-鿿]/.test(c.word);
  const hasEn = /[a-zA-Z]/.test(c.word);
  wordEl.className = 'word-main';
  if (hasCn && hasEn) wordEl.classList.add('mixed');
  else if (hasEn) wordEl.classList.add('latin');
  else wordEl.classList.add('cn');

  // 元数据
  let metaHtml = '';
  metaHtml += `<span>📊 频次: <b>${c.count.toLocaleString()}</b></span>`;
  if (c.pmi != null) metaHtml += `<span>🧲 PMI: <b>${c.pmi.toFixed(1)}</b></span>`;
  if (c.left_entropy != null) metaHtml += `<span>⬅ 左熵: <b>${c.left_entropy.toFixed(1)}</b></span>`;
  if (c.right_entropy != null) metaHtml += `<span>➡ 右熵: <b>${c.right_entropy.toFixed(1)}</b></span>`;

  // 标签
  const source = c.source || '';
  if (source === 'jieba') metaHtml += '<span class="tag tag-source-jieba">jieba</span>';
  else if (source === 'latin') metaHtml += '<span class="tag tag-source-latin">拉丁词</span>';
  else if (source === 'ngram') metaHtml += '<span class="tag tag-source-ngram">ngram</span>';

  if (c.pun_type === 'homophone') metaHtml += '<span class="tag tag-pun">🎯 谐音梗</span>';
  else if (c.pun_type === 'possible_homophone') metaHtml += '<span class="tag tag-pun">🎯? 疑似谐音</span>';
  else if (source === 'ngram') metaHtml += '<span class="tag tag-new">新词发现</span>';

  document.getElementById('wordMeta').innerHTML = metaHtml;

  // 说明
  let reason = c.reason || '';
  if (c.homophones && c.homophones.length > 0) {
    const best = c.homophones[0];
    reason += ` → 原词: "${best.word}" (相似度 ${(best.similarity*100).toFixed(0)}%)`;
  }
  document.getElementById('reasonLine').textContent = reason;

  // 撤销按钮
  document.getElementById('btnUndo').disabled = history.length === 0;
}

// ── 跳过词提示 ─────────────────────────────────────────
function showSkipPrompt() {
  document.getElementById('wordMain').textContent = '⏭️';
  document.getElementById('wordMain').className = 'word-main cn';
  document.getElementById('wordMeta').innerHTML =
    `<span>📋 已跳过 <b>${skipOrder.length}</b> 个词</span>` +
    `<span class="tag tag-new">待处理</span>`;
  document.getElementById('reasonLine').textContent = '这些词你之前选择了跳过，现在可以回顾并决定保留或拒绝';
  document.getElementById('progressText').textContent =
    `✅ 首轮完成 · 保留 ${keepSet.size} · 拒绝 ${removeSet.size} · 跳过 ${skipOrder.length}`;
  document.getElementById('progressBar').style.width = '100%';

  // 显示专用按钮
  document.getElementById('btnAccept').textContent = '📋 回顾跳过词';
  document.getElementById('btnReject').textContent = '💾 完成筛选';
  document.getElementById('btnAccept').onclick = startSkipReview;
  document.getElementById('btnReject').onclick = showDone;
  document.getElementById('btnUndo').disabled = history.length === 0;
}

// ── 开始回看跳过词 ─────────────────────────────────────
function startSkipReview() {
  if (skipOrder.length === 0) {
    showDone();
    return;
  }
  reviewMode = true;
  reviewIndex = 0;
  // 恢复按钮
  document.getElementById('btnAccept').textContent = '✓ 保留';
  document.getElementById('btnReject').textContent = '✕ 拒绝';
  document.getElementById('btnAccept').onclick = accept;
  document.getElementById('btnReject').onclick = reject;
  showSkippedWord();
}

function showSkippedWord() {
  if (reviewIndex >= skipOrder.length) {
    // 回看完毕，清除已处理的跳过词
    skipOrder = [];
    skipSet = new Set();
    reviewMode = false;
    showDone();
    return;
  }

  const word = skipOrder[reviewIndex];
  const c = candidates.find(x => x.word === word);
  if (!c) {
    reviewIndex++;
    showSkippedWord();
    return;
  }

  const total = skipOrder.length;
  document.getElementById('progressBar').style.width = (reviewIndex / total * 100) + '%';
  document.getElementById('progressText').textContent =
    `回看跳过词: ${reviewIndex+1} / ${total} · 保留 ${keepSet.size} · 拒绝 ${removeSet.size} · 剩 ${skipOrder.length - reviewIndex} 待定`;

  const wordEl = document.getElementById('wordMain');
  wordEl.textContent = c.word;
  const hasCn = /[一-鿿]/.test(c.word);
  const hasEn = /[a-zA-Z]/.test(c.word);
  wordEl.className = 'word-main';
  if (hasCn && hasEn) wordEl.classList.add('mixed');
  else if (hasEn) wordEl.classList.add('latin');
  else wordEl.classList.add('cn');

  let metaHtml = '';
  metaHtml += `<span>📊 频次: <b>${c.count.toLocaleString()}</b></span>`;
  if (c.pmi != null) metaHtml += `<span>🧲 PMI: <b>${c.pmi.toFixed(1)}</b></span>`;
  if (c.left_entropy != null) metaHtml += `<span>⬅ 左熵: <b>${c.left_entropy.toFixed(1)}</b></span>`;
  if (c.right_entropy != null) metaHtml += `<span>➡ 右熵: <b>${c.right_entropy.toFixed(1)}</b></span>`;

  const source = c.source || '';
  if (source === 'jieba') metaHtml += '<span class="tag tag-source-jieba">jieba</span>';
  else if (source === 'latin') metaHtml += '<span class="tag tag-source-latin">拉丁词</span>';
  else if (source === 'ngram') metaHtml += '<span class="tag tag-source-ngram">ngram</span>';
  if (c.pun_type === 'homophone') metaHtml += '<span class="tag tag-pun">🎯 谐音梗</span>';

  document.getElementById('wordMeta').innerHTML = metaHtml;

  let reason = c.reason || '';
  if (c.homophones && c.homophones.length > 0) {
    const best = c.homophones[0];
    reason += ` → 原词: "${best.word}" (相似度 ${(best.similarity*100).toFixed(0)}%)`;
  }
  document.getElementById('reasonLine').textContent = reason;

  document.getElementById('btnUndo').disabled = history.length === 0;
}

// ── 操作 ──────────────────────────────────────────────
function accept() {
  if (reviewMode) {
    acceptSkipped();
    return;
  }
  if (currentIndex >= candidates.length) return;
  const word = candidates[currentIndex].word;
  keepSet.add(word);
  removeSet.delete(word);
  // 如果之前跳过，从跳过列表移除
  if (skipSet.has(word)) {
    skipOrder = skipOrder.filter(w => w !== word);
    skipSet.delete(word);
  }
  history.push({ index: currentIndex, action: 'accept', word });
  currentIndex++;
  saveProgress();
  showCurrentWord();
}

function reject() {
  if (reviewMode) {
    rejectSkipped();
    return;
  }
  if (currentIndex >= candidates.length) return;
  const word = candidates[currentIndex].word;
  removeSet.add(word);
  keepSet.delete(word);
  // 如果之前跳过，从跳过列表移除
  if (skipSet.has(word)) {
    skipOrder = skipOrder.filter(w => w !== word);
    skipSet.delete(word);
  }
  history.push({ index: currentIndex, action: 'reject', word });
  currentIndex++;
  saveProgress();
  showCurrentWord();
}

function skip() {
  if (reviewMode) {
    skipSkipped();
    return;
  }
  if (currentIndex >= candidates.length) return;
  const word = candidates[currentIndex].word;
  if (!skipSet.has(word)) {
    skipOrder.push(word);
    skipSet.add(word);
  }
  history.push({ index: currentIndex, action: 'skip', word });
  currentIndex++;
  saveProgress();
  showCurrentWord();
}

// ── 回看模式下的操作 ─────────────────────────────────
function acceptSkipped() {
  if (reviewIndex >= skipOrder.length) return;
  const word = skipOrder[reviewIndex];
  keepSet.add(word);
  removeSet.delete(word);
  skipOrder.splice(reviewIndex, 1);
  skipSet.delete(word);
  // reviewIndex 不自增，因为 splice 后下一个元素自动顶上
  saveProgress();
  showSkippedWord();
}

function rejectSkipped() {
  if (reviewIndex >= skipOrder.length) return;
  const word = skipOrder[reviewIndex];
  removeSet.add(word);
  keepSet.delete(word);
  skipOrder.splice(reviewIndex, 1);
  skipSet.delete(word);
  saveProgress();
  showSkippedWord();
}

function skipSkipped() {
  // 回看模式下跳过 = 保持跳过，移到下一个
  if (reviewIndex >= skipOrder.length) return;
  reviewIndex++;
  saveProgress();
  showSkippedWord();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  if (last.action === 'accept') keepSet.delete(last.word);
  else if (last.action === 'reject') removeSet.delete(last.word);
  else if (last.action === 'skip') {
    // 恢复跳过词
    skipOrder = skipOrder.filter(w => w !== last.word);
    skipSet.delete(last.word);
  }
  currentIndex = last.index;
  saveProgress();
  showCurrentWord();
}

// ── 导出 ──────────────────────────────────────────────
function exportFiles() {
  const keepList = [...keepSet].sort();
  const removeList = [...removeSet].sort();
  const skipList = [...skipOrder];

  // keep.txt
  const keepBlob = new Blob([keepList.join('\n') + '\n'], { type: 'text/plain' });
  const keepUrl = URL.createObjectURL(keepBlob);
  const keepA = document.createElement('a');
  keepA.href = keepUrl;
  keepA.download = 'keep.txt';
  keepA.click();
  URL.revokeObjectURL(keepUrl);

  // remove.txt
  const removeBlob = new Blob([removeList.join('\n') + '\n'], { type: 'text/plain' });
  const removeUrl = URL.createObjectURL(removeBlob);
  const removeA = document.createElement('a');
  removeA.href = removeUrl;
  removeA.download = 'remove.txt';
  removeA.click();
  URL.revokeObjectURL(removeUrl);

  // skip.txt (所有未决定词 = 跳过+未处理，给 merge_categorize.py 用)
  const decidedSet = new Set([...keepSet, ...removeSet]);
  const allSkipWords = candidates
    .filter(c => !decidedSet.has(c.word))
    .map(c => c.word);
  const allSkipList = [...new Set([...skipList, ...allSkipWords])];
  if (allSkipList.length > 0) {
    const skipBlob = new Blob([allSkipList.join('\n') + '\n'], { type: 'text/plain' });
    const skipUrl = URL.createObjectURL(skipBlob);
    setTimeout(() => {
      const skipA = document.createElement('a');
      skipA.href = skipUrl;
      skipA.download = 'skip.txt';
      skipA.click();
      URL.revokeObjectURL(skipUrl);
    }, 200);
  }

  // skip_words.json (含完整元数据，供 merge_categorize.py 使用)
  if (allSkipList.length > 0) {
    const skipWordsData = candidates.filter(c => allSkipList.includes(c.word));
    const skipJsonBlob = new Blob([JSON.stringify(skipWordsData, null, 2)], { type: 'application/json' });
    const skipJsonUrl = URL.createObjectURL(skipJsonBlob);
    setTimeout(() => {
      const skipJsonA = document.createElement('a');
      skipJsonA.href = skipJsonUrl;
      skipJsonA.download = 'skip_words.json';
      skipJsonA.click();
      URL.revokeObjectURL(skipJsonUrl);
    }, 400);
  }

  showToast(`导出: keep.txt(${keepList.length}) + remove.txt(${removeList.length})` +
    (allSkipList.length > 0 ? ` + skip.txt(${allSkipList.length}) + skip_words.json` : ''));
}

// ── 完成 ──────────────────────────────────────────────
function showDone() {
  document.getElementById('filterSection').style.display = 'none';
  document.getElementById('doneSection').style.display = 'block';
  document.getElementById('doneStats').innerHTML =
    `📊 总候选词: <b>${candidates.length}</b><br>` +
    `✅ 保留: <b>${keepSet.size}</b> 个<br>` +
    `❌ 拒绝: <b>${removeSet.size}</b> 个<br>` +
    `⏭️ 跳过: <b>${skipOrder.length}</b> 个<br>` +
    `📋 未处理: <b>${candidates.length - keepSet.size - removeSet.size - skipOrder.length}</b> 个`;
}

// ── 进度持久化 ────────────────────────────────────────
function saveProgress() {
  try {
    const key = 'visual_filter_progress_v2';
    localStorage.setItem(key, JSON.stringify({
      keepSet: [...keepSet],
      removeSet: [...removeSet],
      skipOrder: skipOrder,
      currentIndex,
      timestamp: Date.now()
    }));
  } catch(e) { /* localStorage full, ignore */ }
}

function loadProgress(filename) {
  try {
    const raw = localStorage.getItem('visual_filter_progress_v2');
    if (raw) {
      const saved = JSON.parse(raw);
      // 恢复 skipOrder/skipSet
      if (saved.skipOrder) {
        saved.skipSet = new Set(saved.skipOrder);
      }
      return saved;
    }
  } catch(e) {}
  return null;
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
